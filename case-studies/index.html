<body>
  <div id="site-header"></div>

  <section class="cs-hero">
    <div class="container">
      <div class="cs-hero__badge">Real Work, Real Results</div>
      <h1 class="cs-hero__title">Case Studies</h1>
      <p class="cs-hero__subtitle">Before &amp; after photos from completed jobs across New York City. Licensed &amp; insured work you can trust.</p>
    </div>
  </section>

  <section class="cs-grid-section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title reveal">Completed Projects</h2>
        <p class="section-subtitle reveal">Every job tells a story</p>
      </div>

      <div id="cs-grid" class="cs-grid">
        <div class="cs-loading">
          <div class="cs-loading__dot"></div>
          <div class="cs-loading__dot"></div>
          <div class="cs-loading__dot"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="cs-cta">
    <div class="container">
      <h2 class="cs-cta__title">Need Something Fixed?</h2>
      <p class="cs-cta__sub">Same-day &amp; next-day appointments. Licensed &amp; insured across all 5 boroughs.</p>
      <button class="btn btn--accent btn--lg" data-open-quote>Get a Free Quote</button>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="/components/loader.js" defer></script>
  <script src="/main.js" defer></script>
  <script>
    (async function () {
      const grid = document.getElementById('cs-grid');
      try {
        // org=repair-asap is required by the CRM public case-studies endpoint
        const res = await fetch('https://crm.asap.repair/api/public/case-studies?org=repair-asap&limit=50');
        const { studies } = await res.json();

        if (!studies || studies.length === 0) {
          grid.innerHTML = '<p class="cs-empty">No case studies yet — check back soon.</p>';
          return;
        }

        grid.innerHTML = studies.map(s => `
          <a class="cs-card reveal" href="/case-studies/${s.slug}/">
            <div class="cs-card__photo">
              ${s.thumbnail
                ? `<img src="${s.thumbnail}" alt="${s.title}" loading="lazy" width="600" height="400">`
                : `<div class="cs-card__photo-placeholder">🔧</div>`}
            </div>
            <div class="cs-card__body">
              <div class="cs-card__meta">
                <span class="cs-card__tag">Case Study</span>
                ${s.location ? `<span class="cs-card__location">📍 ${s.location}</span>` : ''}
              </div>
              <h2 class="cs-card__title">${s.title}</h2>
              ${s.excerpt ? `<p class="cs-card__excerpt">${s.excerpt}</p>` : ''}
              <div class="cs-card__footer">
                ${s.price ? `<span class="cs-card__price">${s.price}</span>` : '<span></span>'}
                <span class="cs-card__link">View project →</span>
              </div>
            </div>
          </a>`).join('');

        // Trigger reveal animations if main.js intersection observer is set up
        if (window.initReveal) window.initReveal();
      } catch (e) {
        grid.innerHTML = '<p class="cs-empty">Could not load case studies. Please try again later.</p>';
      }
    })();
  </script>
</body>
