<!DOCTYPE html>
<html>
<head><title>Image Saver</title></head>
<body>
<h1>Click each button to download</h1>
<div id="btns"></div>
<script>
const images = {
  'living': '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/living_room_1777948500057.png',
  'bedroom': '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/bedroom_room_1777948513760.png',
  'kitchen': '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/kitchen_room_1777948528338.png',
  'bathroom': '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/bathroom_room_1777948540703.png',
  'walls': '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/walls_room_1777948554268.png',
  'ac': '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/ac_room_1777948567002.png',
  'outdoor': '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/outdoor_room_1777948583562.png'
};
const c = document.getElementById('btns');
for (const [name, path] of Object.entries(images)) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = 'file://' + path;
  img.style.width = '200px';
  img.style.display = 'block';
  img.style.margin = '10px 0';
  const btn = document.createElement('button');
  btn.textContent = 'Download ' + name + '.png';
  btn.onclick = () => {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.getContext('2d').drawImage(img, 0, 0);
    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name + '.png';
      a.click();
    });
  };
  c.appendChild(img);
  c.appendChild(btn);
}
</script>
</body>
</html>
