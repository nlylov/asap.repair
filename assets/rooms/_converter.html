<!DOCTYPE html>
<html><head><title>Room Image Converter</title></head>
<body>
<h2>Converting room images...</h2>
<pre id="log"></pre>
<script>
const log = document.getElementById('log');
const images = [
  ['living', '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/room_living_final_1777999417408.png'],
  ['bedroom', '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/bedroom_room_1777948513760.png'],
  ['kitchen', '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/kitchen_room_1777948528338.png'],
  ['bathroom', '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/bathroom_room_1777948540703.png'],
  ['walls', '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/walls_room_1777948554268.png'],
  ['ac', '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/ac_room_1777948567002.png'],
  ['outdoor', '/Users/nikita/.gemini/antigravity/brain/a9c35cac-573d-4407-92e1-7e7acacd6f94/outdoor_room_1777948583562.png']
];
window._results = {};
async function processImage(name, path) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = async () => {
      const canvas = document.createElement('canvas');
      // Resize to max 1200px wide for web
      const maxW = 1200;
      const scale = img.naturalWidth > maxW ? maxW / img.naturalWidth : 1;
      canvas.width = Math.round(img.naturalWidth * scale);
      canvas.height = Math.round(img.naturalHeight * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      // Convert to JPEG for smaller size
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      window._results[name] = dataUrl;
      log.textContent += name + ': ' + Math.round(dataUrl.length * 0.75 / 1024) + 'KB\\n';
      resolve();
    };
    img.onerror = () => { log.textContent += name + ': FAILED\\n'; reject(); };
    img.src = 'file://' + path;
  });
}
(async () => {
  for (const [name, path] of images) {
    try { await processImage(name, path); } catch(e) {}
  }
  document.title = 'DONE:' + Object.keys(window._results).length;
  log.textContent += '\\nAll done! ' + Object.keys(window._results).length + ' images ready.';
})();
</script>
</body>
</html>
